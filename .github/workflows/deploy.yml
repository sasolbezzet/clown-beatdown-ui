name: Deploy DEX to GitHub Pages  # trigger rebuild

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write   # to publish to GitHub Pages
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        working-directory: my-src20/frontend
        run: npm install

      # (optional) Export VITE_KIT_KEY if needed
      # - name: Export VITE_KIT_KEY from secret
      #   run: echo "VITE_KIT_KEY=${{ secrets.CIRCLE_KIT_KEY }}" >> $GITHUB_ENV

      - name: Build project
        working-directory: my-src20/frontend
        run: |
          npm run build
          # Vite outputs to my-src20/frontend/dist (relative to repo root)

      # Ensure submodule issues do not block build
      - name: Fix submodule config
        run: |
          git submodule sync || true
          git submodule update --init --recursive || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./my-src20/frontend/dist
          keep_files: false
          force_orphan: true
