name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]          # jalankan tiap push ke branch main
  workflow_dispatch:           # memungkinkan trigger manual
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
  contents: write
  pages: write
  id-token: write
    steps:
      # Checkout kode sumber
      - name: Checkout repository
        uses: actions/checkout@v4
      # Setup Node.js (versi yang sama dengan yang ada di VM)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'       # versi Node pada VM
          cache: 'npm'
      # Install dependencies
      - name: Install dependencies
        run: npm ci
      # Build aplikasi (menghasilkan folder ./dist)
      - name: Build application
        env:
          BASE_URL: '/'            # sesuai dengan homepage di package.json
        run: npm run build
      # Deploy hasil build ke GitHub Pages (branch gh-pages)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: false
