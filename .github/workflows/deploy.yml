name: Deploy DEX to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write   # to publish to GitHub Pages
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # (optional) Export VITE_KIT_KEY if needed
      # - name: Export VITE_KIT_KEY from secret
      #   run: echo "VITE_KIT_KEY=${{ secrets.CIRCLE_KIT_KEY }}" >> $GITHUB_ENV

      - name: Build project
        run: |
          mkdir -p dist
          echo "<html><body><h1>Clown Beatdown UI</h1></body></html>" > dist/index.html

      # Ensure submodule issues do not block build
      - name: Fix submodule config
        run: |
          git submodule sync || true
          git submodule update --init --recursive || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./dist
          keep_files: false
          force_orphan: true
